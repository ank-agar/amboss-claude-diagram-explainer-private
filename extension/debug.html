<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self'; object-src 'none';">
  <title>AMBOSS Diagrams -- Debug</title>
  <link rel="stylesheet" href="debug.css">
</head>
<body>
  <header>
    <h1>AMBOSS Diagram Maker -- Debug</h1>
    <div id="quick-actions">
      <button id="btn-run-all" class="btn primary">Run All Tests</button>
      <button id="btn-copy-report" class="btn primary">Copy Report to Clipboard</button>
    </div>
  </header>

  <section id="tests">
    <h2>Scraping Tests</h2>
    <div class="btn-row">
      <button class="btn" data-test="scrape-question">Question Text</button>
      <button class="btn" data-test="scrape-answers">Answer Choices</button>
      <button class="btn" data-test="scrape-correct">Correct Answer</button>
      <button class="btn" data-test="scrape-explanation">Explanation</button>
      <button class="btn" data-test="scrape-tip">Attending Tip</button>
      <button class="btn" data-test="scrape-all">Full Scrape Dump</button>
    </div>

    <h2>Connection Tests</h2>
    <div class="btn-row">
      <button class="btn" data-test="detect-tab">Detect AMBOSS Tab</button>
      <button class="btn" data-test="parse-url">Parse URL</button>
      <button class="btn" data-test="claude-tab">Check Claude.ai Access</button>
    </div>

    <h2>Message Preview</h2>
    <div class="btn-row">
      <button class="btn" data-test="preview-message">Preview Full Message (Causal Explainer)</button>
      <button class="btn" data-test="preview-flowchart">Preview Full Message (Flowchart)</button>
    </div>

    <h2>Prompt Template (Customizable)</h2>
    <div class="template-editor">
      <label>Main template <span class="hint">Placeholders: {{skillPrefix}}, {{question}}, {{attendingTip}}, {{correctAnswer}}, {{explanation}}, {{allAnswers}}, {{wrongChoiceSection}}. Use {{#if field}}...{{/if}} for conditionals.</span></label>
      <textarea id="template-main" rows="16" spellcheck="false"></textarea>
      <label>Wrong choice addendum <span class="hint">Placeholders: {{wrongChoice}}, {{wrongExplanation}}</span></label>
      <textarea id="template-wrong" rows="3" spellcheck="false"></textarea>
      <div class="btn-row">
        <button class="btn" id="btn-save-templates">Save Templates</button>
        <button class="btn" id="btn-reset-templates">Reset to Defaults</button>
      </div>
    </div>

    <h2>Storage &amp; State</h2>
    <div class="btn-row">
      <button class="btn" data-test="storage-dump">Dump Storage</button>
      <button class="btn" data-test="storage-clear">Clear All Settings</button>
      <button class="btn" data-test="reset-queue">Reset Queue &amp; Timestamps</button>
    </div>
  </section>

  <section id="log-section">
    <div id="log-header">
      <h2>Log</h2>
      <button class="btn small" id="btn-clear-log">Clear</button>
    </div>
    <pre id="log"></pre>
  </section>

  <script src="config.js"></script>
  <script src="template-engine.js"></script>
  <script src="debug.js"></script>
</body>
</html>
