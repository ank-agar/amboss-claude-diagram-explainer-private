<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self'; object-src 'none';">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>AMBOSS Diagrams</h1>
    </header>

    <!-- Status indicator -->
    <div id="status-bar">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">Checking page...</span>
    </div>

    <!-- Queue status (always visible) -->
    <div id="queue-status" class="section-card">
      <div class="section-title">Queue</div>
      <div id="queue-info">No items in queue</div>
    </div>

    <!-- Section 1: Single Generate -->
    <div class="section-card">
      <div class="section-title">Single Generate</div>
      <div id="skill-buttons"></div>
      <label class="toggle-row">
        <span>Open Claude tab in background</span>
        <input type="checkbox" id="toggle-background">
      </label>
    </div>

    <!-- Section 2: Batch Generate (hidden until session detected) -->
    <div id="expansion-panel" class="section-card hidden">
      <div class="section-title">Batch Generate</div>
      <div id="expansion-range">
        <label>
          <span>From Q</span>
          <select id="expand-start"></select>
        </label>
        <label>
          <span>To</span>
          <select id="expand-end"></select>
        </label>
      </div>
      <div id="expansion-options">
        <label>
          <span>Skill:</span>
          <select id="expand-skill"></select>
        </label>
        <label>
          <span>Claude tabs:</span>
          <select id="expand-layout">
            <option value="same-window">Same window</option>
            <option value="separate">Separate window</option>
          </select>
        </label>
      </div>
      <div id="expansion-estimate"></div>
      <button class="skill-btn" id="expand-btn" disabled>
        <span class="skill-icon">&#x1F4DA;</span>
        <span class="skill-content">
          <span class="skill-label" id="expand-btn-label">Generate All</span>
          <span class="skill-hint" id="expand-btn-hint">Select a range above</span>
        </span>
      </button>
    </div>

    <!-- Section 3: Auto Generate -->
    <div class="section-card">
      <div class="section-title">Auto Generate on Answer</div>
      <label class="toggle-row">
        <span>Enabled</span>
        <input type="checkbox" id="toggle-auto-generate">
      </label>
      <div id="auto-generate-skill-row" class="setting-row hidden">
        <span>Skill</span>
        <select id="auto-generate-skill"></select>
      </div>
      <div class="section-hint">When on, answering an AMBOSS question automatically generates a diagram in a background tab.</div>
    </div>

    <!-- Section 4: Settings -->
    <div class="section-card">
      <div class="section-title">Settings</div>
      <label class="setting-row">
        <span>Default skill</span>
        <select id="select-default-skill"></select>
      </label>
      <div class="section-subtitle">Prompt add-ons (applies to all modes)</div>
      <label class="toggle-row">
        <span>Explain what from the stem gives away the diagnosis</span>
        <input type="checkbox" id="toggle-addon-stem">
      </label>
      <label class="toggle-row">
        <span>Explain why my wrong answer was wrong</span>
        <input type="checkbox" id="toggle-addon-wrong">
      </label>
      <label class="toggle-row">
        <span>Explain what each choice is + why it's right/wrong</span>
        <input type="checkbox" id="toggle-addon-all-choices">
      </label>
      <label class="toggle-row sub-toggle hidden" id="include-choice-explanations-row">
        <span>Include each choice's explanation in prompt</span>
        <input type="checkbox" id="toggle-include-choice-explanations">
      </label>
      <div class="section-subtitle" style="margin-top: 8px;">Rate limiting</div>
      <label class="setting-row">
        <span>Cooldown (per 3 sends)</span>
        <select id="select-cooldown">
          <option value="60000">1 min</option>
          <option value="90000">1.5 min</option>
          <option value="120000">2 min</option>
          <option value="150000">2.5 min</option>
          <option value="180000">3 min</option>
          <option value="240000">4 min</option>
          <option value="300000">5 min</option>
          <option value="330000" selected>5.5 min</option>
          <option value="360000">6 min</option>
          <option value="420000">7 min</option>
          <option value="480000">8 min</option>
          <option value="540000">9 min</option>
          <option value="600000">10 min</option>
          <option value="720000">12 min</option>
          <option value="900000">15 min</option>
        </select>
      </label>
    </div>

    <!-- Footer -->
    <div id="footer">
      <a href="#" id="open-debug">Debug</a>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="template-engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
